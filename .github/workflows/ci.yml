name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python
        run: python3 -m compileall -q notify.py presummary.py

      - name: Shell script syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n test.sh

      - name: Unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 -m unittest discover -s tests -v
